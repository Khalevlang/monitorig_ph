<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring pH | lang2712</title>
    <style>
        :root { --primary: #1a73e8; --success: #1e8e3e; --danger: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 30px; text-align: center; width: 100%; max-width: 400px; border-top: 8px solid var(--primary); }
        .ph-val { font-size: 5rem; font-weight: 800; color: var(--primary); margin: 15px 0; line-height: 1; }
        .badge { display: inline-block; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.8rem; margin-bottom: 20px; }
        .online { background: #e6f4ea; color: var(--success); }
        .offline { background: #fce8e6; color: var(--danger); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #eee; padding-top: 20px; }
        .item { font-size: 0.75rem; color: #666; text-transform: uppercase; font-weight: bold; }
        .val { display: block; font-size: 1.1rem; font-weight: 600; color: #333; margin-top: 5px; }
        .btn-fix { background: #3c4043; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="st-badge" class="badge offline">MENGHUBUNGKAN...</div>
        <div class="item">pH REAL-TIME</div>
        <div id="ph-display" class="ph-val">--</div>
        
        <div class="grid">
            <div><span class="item">Waktu</span><span id="time-display" class="val">--:--:--</span></div>
            <div><span class="item">Pompa</span><span id="pump-display" class="val">OFF</span></div>
            <div><span class="item">Voltase</span><span id="volt-display" class="val">0.00V</span></div>
            <div><span class="item">Topic</span><span class="val" style="font-size: 0.7rem;">lang2712/data</span></div>
        </div>

        <button class="btn-fix" onclick="window.open('https://test.mosquitto.org', '_blank')">
            KLIK DISINI JIKA TETAP OFFLINE
        </button>
    </div>

    <!-- LIBRARY PAHO MQTT LENGKAP (INTERNAL) -->
    <script src="https://cdnjs.cloudflare.com" type="text/javascript"></script>

    <script>
        // KONFIGURASI MQTT
        const BROKER = "test.mosquitto.org";
        const PORT = 8081; 
        const TOPIC = "lang2712/data";
        const CLIENT_ID = "khalev_web_" + Math.random().toString(16).substr(2, 4);

        // Pastikan Paho dimuat sebelum inisialisasi
        let client;

        function startConnect() {
            try {
                client = new Paho.MQTT.Client("wss://" + BROKER + ":" + PORT + "/mqtt", CLIENT_ID);

                client.onConnectionLost = (resp) => {
                    updateStatus("OFFLINE / RECONNECTING", false);
                    setTimeout(startConnect, 5000);
                };

                client.onMessageArrived = (msg) => {
                    console.log("Data: " + msg.payloadString);
                    try {
                        const data = JSON.parse(msg.payloadString);
                        document.getElementById("ph-display").innerText = data.ph.toFixed(2);
                        document.getElementById("time-display").innerText = data.time;
                        document.getElementById("volt-display").innerText = data.volt.toFixed(2) + "V";
                        document.getElementById("pump-display").innerText = data.status;
                        updateStatus("SISTEM ONLINE", true);
                    } catch (e) { console.log("JSON Parse Error"); }
                };

                client.connect({
                    onSuccess: () => {
                        console.log("Connected!");
                        client.subscribe(TOPIC);
                        updateStatus("MENUNGGU DATA...", true);
                    },
                    onFailure: (err) => {
                        console.log("Failed: " + err.errorMessage);
                        updateStatus("GAGAL KONEK", false);
                        setTimeout(startConnect, 5000);
                    },
                    useSSL: true,
                    timeout: 10
                });
            } catch (e) {
                updateStatus("LIBRARY ERROR", false);
            }
        }

        function updateStatus(txt, isOnline) {
            const el = document.getElementById("st-badge");
            el.innerText = txt;
            el.className = "badge " + (isOnline ? "online" : "offline");
        }

        // Jalankan koneksi
        window.onload = startConnect;
    </script>
</body>
</html>
