<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard pH | lang2712</title>
    <!-- Library Paho MQTT Official -->
    <script src="https://cdnjs.cloudflare.com" type="text/javascript"></script>
    <style>
        :root { --blue: #1a73e8; --green: #1e8e3e; --red: #d93025; --gray: #5f6368; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); padding: 30px; width: 100%; max-width: 400px; text-align: center; border-top: 8px solid var(--blue); }
        .ph-val { font-size: 5.5rem; font-weight: 800; color: var(--blue); margin: 15px 0; line-height: 1; }
        .badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; margin-bottom: 20px; text-transform: uppercase; }
        .online { background: #e6f4ea; color: var(--green); }
        .offline { background: #fce8e6; color: var(--red); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid #eee; padding-top: 25px; margin-top: 10px; }
        .label { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .data { display: block; font-size: 1.1rem; font-weight: 600; color: #333; margin-top: 5px; }
        .btn-fix { background: #3c4043; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 25px; width: 100%; font-weight: bold; font-size: 0.75rem; }
        .btn-fix:hover { background: #202124; }
    </style>
</head>
<body>

    <div class="card">
        <div id="st-badge" class="badge offline">MENGHUBUNGKAN...</div>
        <div class="label">NILAI pH AIR</div>
        <div id="ph-display" class="ph-val">--</div>
        
        <div class="grid">
            <div><span class="label">Waktu</span><span id="time-display" class="data">--:--:--</span></div>
            <div><span class="label">Pompa</span><span id="pump-display" class="data">OFF</span></div>
            <div><span class="label">Voltase</span><span id="volt-display" class="data">0.00V</span></div>
            <div><span class="label">Status</span><span id="st-text" class="data" style="font-size: 0.8rem;">Checking...</span></div>
        </div>

        <button class="btn-fix" onclick="window.open('https://test.mosquitto.org', '_blank')">
            KLIK DISINI JIKA TETAP OFFLINE
        </button>
    </div>

    <script>
        // KONFIGURASI MQTT
        const BROKER = "test.mosquitto.org";
        const PORT = 8081; // WSS Port
        const TOPIC = "lang2712/data";
        const CLIENT_ID = "khalevlang_web_" + Math.random().toString(16).substr(2, 4);

        // Inisialisasi Paho Client
        const client = new Paho.MQTT.Client("wss://" + BROKER + ":" + PORT + "/mqtt", CLIENT_ID);

        client.onConnectionLost = (resp) => {
            console.log("Koneksi Putus: " + resp.errorMessage);
            setUIStatus("OFFLINE / RECONNECTING", false);
            setTimeout(doConnect, 5000);
        };

        client.onMessageArrived = (msg) => {
            console.log("Data: " + msg.payloadString);
            try {
                const data = JSON.parse(msg.payloadString);
                document.getElementById("ph-display").innerText = data.ph.toFixed(2);
                document.getElementById("time-display").innerText = data.time;
                document.getElementById("volt-display").innerText = data.volt.toFixed(2) + "V";
                document.getElementById("pump-display").innerText = data.status;
                
                setUIStatus("SISTEM ONLINE", true);
                document.getElementById("st-text").innerText = "Data Diterima";
            } catch (e) { 
                console.error("Format JSON salah!"); 
            }
        };

        function setUIStatus(txt, isOnline) {
            const el = document.getElementById("st-badge");
            el.innerText = txt;
            el.className = "badge " + (isOnline ? "online" : "offline");
        }

        function doConnect() {
            client.connect({
                onSuccess: () => {
                    console.log("Terhubung ke Broker!");
                    client.subscribe(TOPIC);
                    setUIStatus("MENUNGGU DATA...", true);
                    document.getElementById("st-text").innerText = "Tersambung";
                },
                onFailure: (err) => {
                    console.log("Gagal: " + err.errorMessage);
                    setUIStatus("GAGAL KONEK", false);
                    setTimeout(doConnect, 5000);
                },
                useSSL: true, // Wajib TRUE untuk GitHub Pages
                timeout: 10,
                keepAliveInterval: 30
            });
        }

        // Jalankan Koneksi
        doConnect();
    </script>
</body>
</html>
